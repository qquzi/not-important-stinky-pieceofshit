<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonSec Deobfuscation</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; background: #0b0c10; color: #c5c6c7; }
        .banner-container { text-align: center; margin-bottom: 20px; }
        .banner-img { max-width: 100%; height: auto; border-radius: 8px; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; font-family: monospace; background: #1f2833; color: #66fcf1; border: 1px solid #45a29e; border-radius: 4px; padding: 10px; box-sizing: border-box; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #45a29e; color: #0b0c10; border: none; border-radius: 4px; font-weight: bold; width: 100%; }
        button:hover { background: #66fcf1; }
        pre { background: #1f2833; padding: 15px; white-space: pre-wrap; font-family: monospace; border: 1px solid #45a29e; border-radius: 4px; color: #c5c6c7; overflow-x: auto; }
        h3 { color: #45a29e; }
    </style>
</head>
<body>
    <div class="banner-container">
        <img src="/banner.png" alt="MoonSec Deobfuscation Banner" class="banner-img">
    </div>
    
    <h3>Input Code:</h3>
    <textarea id="input" placeholder="Paste obfuscated MoonSec Lua code here..."></textarea>
    
    <button onclick="processCode()">Deobfuscate</button>
    
    <h3>Output Code:</h3>
    <pre id="output">Result will appear here...</pre>

    <script>
        async function processCode() {
            const inputCode = document.getElementById('input').value;
            const outputElement = document.getElementById('output');
            outputElement.textContent = "Processing...";

            try {
                const response = await fetch('/deobfuscate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: inputCode })
                });
                
                const data = await response.json();
                if (data.error) {
                    outputElement.textContent = "Error: " + data.error;
                } else {
                    outputElement.textContent = data.deobfuscated_code;
                }
            } catch (err) {
                outputElement.textContent = "Error connecting to server.";
            }
        }
    </script>
</body>
</html>
