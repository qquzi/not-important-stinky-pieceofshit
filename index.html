<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua Deobfuscator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; font-family: monospace; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 15px; white-space: pre-wrap; font-family: monospace; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Lua Deobfuscator</h1>
    
    <h3>Input Code:</h3>
    <textarea id="input" placeholder="Paste obfuscated Lua code here..."></textarea>
    
    <button onclick="processCode()">Deobfuscate</button>
    
    <h3>Output Code:</h3>
    <pre id="output">Result will appear here...</pre>

    <script>
        async function processCode() {
            const inputCode = document.getElementById('input').value;
            const outputElement = document.getElementById('output');
            outputElement.textContent = "Processing...";

            try {
                const response = await fetch('/deobfuscate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: inputCode })
                });
                
                const data = await response.json();
                if (data.error) {
                    outputElement.textContent = "Error: " + data.error;
                } else {
                    outputElement.textContent = data.deobfuscated_code;
                }
            } catch (err) {
                outputElement.textContent = "Error connecting to server.";
            }
        }
    </script>
</body>
</html>
